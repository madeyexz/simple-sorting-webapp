<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sorting Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Sorting Dashboard</h1>
    <div class="header-actions">
      <button id="btn-add-item" class="btn btn-primary">+ Add Item</button>
      <button id="btn-add-question" class="btn btn-secondary">+ Add Question</button>
    </div>
  </header>

  <section id="item-pool">
    <h2>Unsorted Items</h2>
    <div id="pool-items" class="drop-zone" data-question="" data-category=""></div>
  </section>

  <section id="questions-container"></section>

  <!-- Modal -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <h3 id="modal-title"></h3>
      <div id="modal-body"></div>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn">Cancel</button>
        <button id="modal-save" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
